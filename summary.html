<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Milos Dimitrijevic">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="application-name" content="Join">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Join">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#2A3647">
    <meta name="msapplication-TileColor" content="#2A3647">
    <title>Join | Summary Dashboard</title>
    <meta name="description" content="Get a quick overview of tasks, deadlines, and priorities in your Join summary dashboard.">
    <link rel="canonical" href="https://join.dimit.cc/summary.html">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Join">
    <meta property="og:title" content="Join | Summary Dashboard">
    <meta property="og:description" content="Review your daily workload and project status at a glance in Join.">
    <meta property="og:url" content="https://join.dimit.cc/summary.html">
    <meta property="og:image" content="https://join.dimit.cc/assets/img/join_logo_login.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Join | Summary Dashboard">
    <meta name="twitter:description" content="Review your daily workload and project status at a glance in Join.">
    <meta name="twitter:image" content="https://join.dimit.cc/assets/img/join_logo_login.png">

    <link rel="icon" type="image/png" href="assets/img/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon/favicon.svg">
    <link rel="shortcut icon" href="assets/img/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/img/favicon/site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/summary.css">
</head>

<body onload="init(); initSummary()">

    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar" w3-include-html="assets/templates/sidebar.html"></nav>

        <!-- Main Content Area -->
        <div class="main-area">
            <!-- Mobile Greeting Overlay -->
            <div id="mobileGreeting" class="mobile-greeting-overlay d-none">
                <div class="greeting-content"></div>
            </div>

            <header class="header" w3-include-html="assets/templates/header.html"></header>
            <main class="content">
                <div class="dashboard-header">
                    <h1>Join 360</h1>
                    <div class="header-divider"></div>
                    <span class="header-subtitle">Key Metrics at a Glance</span>
                </div>

                <div class="dashboard-content">

                    <div class="metrics-container">

                        <div class="metrics-row row-2-cols">
                            <div class="metric-card square-card" onclick="window.location.href='board.html'">
                                <div class="card-icon edit-icon">
                                    <img src="assets/img/to-do-summary-icon.png" alt="To-do" class="icon-default">
                                    <img src="assets/img/pencil-white-background.png" alt="To-do" class="icon-hover">
                                </div>
                                <div class="card-number-box">
                                    <span class="card-number" id="summaryTodo">0</span>
                                    <span class="card-label">To-do</span>
                                </div>
                            </div>
                            <div class="metric-card square-card" onclick="window.location.href='board.html'">
                                <div class="card-icon check-icon">
                                    <img src="assets/img/done-summary-icon.png" alt="Done" class="icon-default">
                                    <img src="assets/img/check-mark-white-background.png" alt="Done" class="icon-hover">
                                </div>
                                <div class="card-number-box">
                                    <span class="card-number" id="summaryDone">0</span>
                                    <span class="card-label">Done</span>
                                </div>
                            </div>
                        </div>

                        <div class="metrics-row">
                            <div class="metric-card wide-card" onclick="window.location.href='board.html'">
                                <div class="urgent-left">
                                    <div class="card-icon urgent-icon">
                                        <img src="assets/img/urgent_summary_icon.png" alt="Urgent">
                                    </div>
                                    <div class="card-number-box">
                                        <span class="card-number" id="summaryUrgent">0</span>
                                        <span class="card-label">Urgent</span>
                                    </div>
                                </div>
                                <div class="urgent-divider"></div>
                                <div class="urgent-right">
                                    <span class="urgent-date" id="summaryUrgentDate">None upcoming</span>
                                    <span class="urgent-deadline-label">Upcoming Deadline</span>
                                </div>
                            </div>
                        </div>

                        <div class="metrics-row row-3-cols">
                            <div class="metric-card small-card" onclick="window.location.href='board.html'">
                                <span class="card-number" id="summaryTotal">0</span>
                                <span class="card-label">Tasks in<br>Board</span>
                            </div>
                            <div class="metric-card small-card" onclick="window.location.href='board.html'">
                                <span class="card-number" id="summaryInProgress">0</span>
                                <span class="card-label">Tasks In<br>Progress</span>
                            </div>
                            <div class="metric-card small-card" onclick="window.location.href='board.html'">
                                <span class="card-number" id="summaryAwaiting">0</span>
                                <span class="card-label">Awaiting<br>Feedback</span>
                            </div>
                        </div>

                    </div>

                    <div class="greeting-container">
                        <h2 class="greeting-text">Good morning,</h2>
                        <h2 class="greeting-name">Guest</h2>
                    </div>

                </div>
            </main>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/summary.js"></script>
</body>

</html>
