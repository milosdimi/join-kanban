<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Milos Dimitrijevic">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="application-name" content="Join">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Join">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#2A3647">
    <meta name="msapplication-TileColor" content="#2A3647">
    <title>Join | Create Your Account</title>
    <meta name="description" content="Create your Join account and start organizing your work with a clear Kanban-based project workflow.">
    <link rel="canonical" href="https://join.dimit.cc/signup.html">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Join">
    <meta property="og:title" content="Join | Create Your Account">
    <meta property="og:description" content="Sign up for Join and manage tasks and projects in one visual workspace.">
    <meta property="og:url" content="https://join.dimit.cc/signup.html">
    <meta property="og:image" content="https://join.dimit.cc/assets/img/social_preview.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Join | Create Your Account">
    <meta name="twitter:description" content="Sign up for Join and manage tasks and projects in one visual workspace.">
    <meta name="twitter:image" content="https://join.dimit.cc/assets/img/social_preview.png">

    <link rel="icon" type="image/png" href="assets/img/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon/favicon.svg">
    <link rel="shortcut icon" href="assets/img/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/img/favicon/site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body onload="initSignup()">

    <div id="loader-overlay" class="loader-overlay d-none">
        <div class="loader"></div>
    </div>

    <main class="login-page">
        <header class="login-header">
            <img src="assets/img/join_logo_login.png" alt="Join Logo" class="logo">
        </header>

        <section class="login-card">
            <a href="index.html" class="arrow-back">
                <img src="assets/img/arrow_left_icon.png" alt="Back">
            </a>

            <h1>Sign up</h1>
            <div class="underline"></div>

            <form id="signupForm" onsubmit="register(); return false;" novalidate>
                <div class="input-container">
                    <input type="text" id="name" placeholder="Name" required>
                    <img src="assets/img/user_icon.png" alt="Name" class="input-icon">
                    <div id="msg-name" class="input-error-msg d-none"></div>
                </div>
                <div class="input-container">
                    <input type="email" id="email" placeholder="Email" required>
                    <img src="assets/img/mail_icon.png" alt="Email" class="input-icon">
                    <div id="msg-email" class="input-error-msg d-none"></div>
                </div>
                <div class="input-container">
                    <input type="password" id="password" placeholder="Password" required oninput="updatePasswordIcon('password'); validatePassword()">
                    <img src="assets/img/lock_icon.png" alt="Password" class="input-icon" onclick="togglePasswordVisibility('password', this)">
                    <div id="msg-password" class="input-error-msg d-none"></div>
                </div>
                <div class="input-container">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required oninput="updatePasswordIcon('confirmPassword'); validatePassword()">
                    <img src="assets/img/lock_icon.png" alt="Confirm Password" class="input-icon" onclick="togglePasswordVisibility('confirmPassword', this)">
                    <div id="msg-confirmPassword" class="input-error-msg d-none"></div>
                </div>
                
                <div id="msgBox" class="validation-msg">Passwords don't match</div>

                <div class="privacy-policy">
                    <input type="checkbox" id="privacyPolicy" required onchange="toggleSignupBtn()">
                    <label for="privacyPolicy">I accept the <a href="privacy-policy.html">Privacy policy</a></label>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-primary" id="signupBtn" disabled>Sign up</button>
                </div>
            </form>
        </section>
        <footer class="login-footer">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="legal-notice.html">Legal notice</a>
        </footer>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="js/firebase-init.js"></script>

    <script src="js/dummy-data.js"></script>
    <script src="js/script.js"></script>
    <script src="js/script-ui.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
