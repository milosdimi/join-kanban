<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Milos Dimitrijevic">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="application-name" content="Join">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Join">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#2A3647">
    <meta name="msapplication-TileColor" content="#2A3647">
    <title>Join | Add Task</title>
    <meta name="description" content="Create detailed tasks with assignees, priorities, categories, and due dates in Join.">
    <link rel="canonical" href="https://join.dimit.cc/add-task.html">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Join">
    <meta property="og:title" content="Join | Add Task">
    <meta property="og:description" content="Add and structure new tasks quickly to keep your team workflow clear.">
    <meta property="og:url" content="https://join.dimit.cc/add-task.html">
    <meta property="og:image" content="https://join.dimit.cc/assets/img/social_preview.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Join | Add Task">
    <meta name="twitter:description" content="Add and structure new tasks quickly to keep your team workflow clear.">
    <meta name="twitter:image" content="https://join.dimit.cc/assets/img/social_preview.png">

    <link rel="icon" type="image/png" href="assets/img/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon/favicon.svg">
    <link rel="shortcut icon" href="assets/img/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/img/favicon/site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/summary.css">
    <link rel="stylesheet" href="css/add-task.css">
</head>
<body onload="init(); initAddTask()">
    
    <div id="loader-overlay" class="loader-overlay d-none">
        <div class="loader"></div>
    </div>

    
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar" w3-include-html="assets/templates/sidebar.html"></nav>

        <!-- Main Content Area -->
        <div class="main-area">
            <header class="header" w3-include-html="assets/templates/header.html"></header>

            <main class="content">
                <h1>Add Task</h1>
                
                <form id="addTaskForm" onsubmit="handleTaskFormSubmit(); return false;" novalidate>
                    <div class="form-layout">
                        <!-- Left Column -->
                        <div class="form-column">
                            <div class="input-group">
                                <label for="title">Title<span class="required">*</span></label>
                                <input type="text" id="title" placeholder="Enter a title" required>
                            </div>

                            <div class="input-group">
                                <label for="description">Description</label>
                                <textarea id="description" placeholder="Enter a Description"></textarea>
                            </div>

                            <div class="input-group">
                                <label for="dueDate">Due date<span class="required">*</span></label>
                                <input type="date" id="dueDate" required>
                            </div>
                        </div>

                        <div class="divider-vertical"></div>

                        <!-- Right Column -->
                        <div class="form-column">
                            <div class="input-group">
                                <label>Prio</label>
                                <div class="prio-buttons">
                                    <button type="button" class="prio-btn urgent" id="prioUrgent" onclick="setPrio('urgent')">Urgent <img src="assets/img/urgent_icon.png" alt=""></button>
                                    <button type="button" class="prio-btn medium active" id="prioMedium" onclick="setPrio('medium')">Medium <img src="assets/img/medium_icon.png" alt=""></button>
                                    <button type="button" class="prio-btn low" id="prioLow" onclick="setPrio('low')">Low <img src="assets/img/low_icon.png" alt=""></button>
                                </div>
                            </div>

                            <div class="input-group">
                                <label>Assigned to</label>
                                <div id="dropdownAssigned" class="dropdown-container" onclick="toggleContactsDropdown(event)">
                                    <div class="dropdown-select">
                                        <span id="dropdownSelectText">Select contacts to assign</span>
                                        <img src="assets/img/arrow_left_icon.png" alt="â–¼" class="dropdown-arrow">
                                    </div>
                                    <div id="dropdownOptions" class="dropdown-options d-none" onclick="event.stopPropagation()"></div>
                                </div>
                                <div id="selectedContactsContainer" class="selected-contacts-badges"></div>
                            </div>

                            <div class="input-group">
                                <label for="category">Category<span class="required">*</span></label>
                                <div class="select-wrapper">
                                    <select id="category" required>
                                        <option value="" disabled selected>Select task category</option>
                                        <option value="Technical Task">Technical Task</option>
                                        <option value="User Story">User Story</option>
                                    </select>
                                    <img src="assets/img/arrow_left_icon.png" alt="â–¼" class="select-arrow">
                                </div>
                            </div>

                            <div class="input-group">
                                <label for="subtask">Subtasks</label>
                                <div class="subtask-input-wrapper">
                                    <input type="text" id="subtask" placeholder="Add new subtask">
                                    <div class="subtask-icons" onmousedown="event.preventDefault()">
                                        <img src="assets/img/cancel_icon.svg" alt="Clear" class="subtask-icon-cancel" onclick="clearSubtaskInput()">
                                        <div class="subtask-separator"></div>
                                        <div class="subtask-icon-check-btn" onclick="addSubtask()">
                                            <img src="assets/img/check_dark_icon.svg" alt="Add" class="subtask-icon-check">
                                        </div>
                                    </div>
                                </div>
                                <ul id="subtaskList" class="subtask-list"></ul>
                            </div>
                        </div>
                    </div>

                    <div class="form-footer">
                        <span class="required-info"><span class="required">*</span>This field is required</span>
                        <div class="form-actions">
                            <button type="button" class="btn-clear" onclick="clearTask()">Clear <img src="assets/img/cancel_icon.svg" alt=""></button>
                            <button type="submit" class="btn-primary btn-create">Create Task <img src="assets/img/check_icon.png" alt=""></button>
                        </div>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <div id="taskAddedMsg" class="task-added-msg d-none">
        Task added to board <img src="assets/img/board-icon.svg" alt="">
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="js/firebase-init.js"></script>

    <script src="js/dummy-data.js"></script>
    <script src="js/script.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/add-task.js"></script>
</body>
</html>
