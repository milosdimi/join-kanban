<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Milos Dimitrijevic">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="application-name" content="Join">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Join">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#2A3647">
    <meta name="msapplication-TileColor" content="#2A3647">
    <title>Join | Contacts</title>
    <meta name="description" content="Manage your project contacts and team members in one central place with Join.">
    <link rel="canonical" href="https://join.dimit.cc/contacts.html">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Join">
    <meta property="og:title" content="Join | Contacts">
    <meta property="og:description" content="Keep teammates and collaborators organized with the Join contacts view.">
    <meta property="og:url" content="https://join.dimit.cc/contacts.html">
    <meta property="og:image" content="https://join.dimit.cc/assets/img/social_preview.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Join | Contacts">
    <meta name="twitter:description" content="Keep teammates and collaborators organized with the Join contacts view.">
    <meta name="twitter:image" content="https://join.dimit.cc/assets/img/social_preview.png">

    <link rel="icon" type="image/png" href="assets/img/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon/favicon.svg">
    <link rel="shortcut icon" href="assets/img/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/img/favicon/site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/summary.css">
    <link rel="stylesheet" href="css/contacts.css">
</head>
<body onload="init(); initContacts()">
    
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar" w3-include-html="assets/templates/sidebar.html"></nav>

        <!-- Main Content Area -->
        <div class="main-area">
            <header class="header" w3-include-html="assets/templates/header.html"></header>

            <main class="content contacts-container">
                <!-- Contact List (Left) -->
                <div class="contact-list-container">
                    <div class="contact-list-btn-container">
                        <button class="btn-primary btn-add-contact" onclick="openAddContact()">Add new contact <img src="assets/img/add_contact_icon.png" alt="Add contact"></button>
                    </div>
                    <div id="contactList" class="contact-list">
                    </div>
                </div>

                <!-- Contact Detail (Right) -->
                <div class="contact-detail-view">
                    <div class="contacts-header">
                        <h1>Contacts</h1>
                        <div class="header-divider-vertical"></div>
                        <span class="header-subtitle">Better with a team</span>
                        <div class="header-underline-blue d-none"></div> <!-- StandardmÃ¤ÃŸig versteckt, Mobile per CSS sichtbar -->
                    </div>

                    <div id="contactDetail" class="contact-detail-content">
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Contact Overlay -->
    <div id="addContactOverlay" class="overlay d-none" onclick="closeAddContact()">
        <div class="add-contact-card" onclick="event.stopPropagation()">
            <div class="close-icon-container">
                <img src="assets/img/cancel_icon.svg" alt="Close" class="close-icon" onclick="closeAddContact()">
            </div>

            <div class="add-contact-left">
                <img src="assets/img/join_logo_menu.png" alt="Join Logo" class="add-contact-logo">
                <h2 id="contactModalTitle">Add contact</h2>
                <p>Tasks are better with a team!</p>
                <div class="blue-line-horizontal"></div>
            </div>
            
            <div class="add-contact-right">
                <div class="add-contact-form-container">
                    <div id="contactModalAvatar" class="add-contact-user-img">
                        <img src="assets/img/person.svg" alt="User" class="user-icon-placeholder">
                    </div>

                    <form id="contactForm" onsubmit="handleContactFormSubmit(); return false;" novalidate>
                        <div class="contact-input-wrapper">
                            <input type="text" id="contactName" placeholder="Name" class="input-contact input-name" required>
                            <div id="msg-contactName" class="contact-error-msg d-none"></div>
                        </div>
                        <div class="contact-input-wrapper">
                            <input type="email" id="contactEmail" placeholder="Email" class="input-contact input-email" required>
                            <div id="msg-contactEmail" class="contact-error-msg d-none"></div>
                        </div>
                        <div class="contact-input-wrapper">
                            <input type="tel" id="contactPhone" placeholder="Phone" class="input-contact input-phone">
                            <div id="msg-contactPhone" class="contact-error-msg d-none"></div>
                        </div>
                        
                        <div class="add-contact-actions">
                            <button type="button" class="btn-transparent" onclick="closeAddContact()">Cancel <img src="assets/img/cancel_icon.svg" alt=""></button>
                            <button type="submit" id="contactModalSubmitBtn" class="btn-primary btn-create-contact">Create contact <img src="assets/img/check_icon.png" alt=""></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/dummy-data.js"></script>
    <script src="js/script.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/contacts.js"></script>
</body>
</html>
