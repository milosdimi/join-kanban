<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Milos Dimitrijevic">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="application-name" content="Join">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Join">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#2A3647">
    <meta name="msapplication-TileColor" content="#2A3647">
    <title>Join | Login to Your Kanban Workspace</title>
    <meta name="description" content="Log in to Join and manage your projects, tasks, and teams with a fast, Kanban-based workflow.">
    <link rel="canonical" href="https://join.dimit.cc/index.html">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Join">
    <meta property="og:title" content="Join | Login to Your Kanban Workspace">
    <meta property="og:description" content="Sign in to Join and keep your projects organized with a clear Kanban board.">
    <meta property="og:url" content="https://join.dimit.cc/index.html">
    <meta property="og:image" content="https://join.dimit.cc/assets/img/social_preview.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Join | Login to Your Kanban Workspace">
    <meta name="twitter:description" content="Sign in to Join and keep your projects organized with a clear Kanban board.">
    <meta name="twitter:image" content="https://join.dimit.cc/assets/img/social_preview.png">

    <link rel="icon" type="image/png" href="assets/img/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon/favicon.svg">
    <link rel="shortcut icon" href="assets/img/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/img/favicon/site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body onload="init()">

    <main class="login-page">
        <header class="login-header">
            <img src="assets/img/join_logo_login.png" alt="Join Logo" class="logo">
        </header>

        <section class="login-card">
            <h1>Log in</h1>
            <div class="underline"></div>

            <form id="loginForm" onsubmit="login(); return false;" novalidate>
                <div class="input-container">
                    <input type="email" id="email" placeholder="Email" required>
                    <img src="assets/img/mail_icon.png" alt="Email" class="input-icon">
                    <div id="msg-email" class="input-error-msg d-none"></div>
                </div>
                
                <div class="input-container">
                    <input type="password" id="password" placeholder="Password" required oninput="updatePasswordIcon('password')">
                    <img src="assets/img/lock_icon.png" alt="Password" class="input-icon" onclick="togglePasswordVisibility('password', this)">
                    <div id="msg-password" class="input-error-msg d-none"></div>
                </div>

                <div id="msgBox" class="validation-msg">Email or password is incorrect.</div>

                <div class="options-container">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-primary">Log in</button>
                    <button type="button" class="btn-guest" onclick="guestLogin()">Guest Log in</button>
                </div>
            </form>
        </section>

        <div class="header-signup-box">
            <span>Not a Join user?</span>
            <a href="signup.html" class="btn-signup-link">Sign up</a>
        </div>

        <footer class="login-footer">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="legal-notice.html">Legal notice</a>
        </footer>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="js/firebase-init.js"></script>

    <script src="js/dummy-data.js"></script>
    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
